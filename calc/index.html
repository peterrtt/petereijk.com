<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calculator">
  <title>Calculator</title>
  <script>
    // Generate Apple-style Calculator icon and inject as apple-touch-icon
    (function () {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const g = c.getContext('2d');
      g.scale(0.5, 0.5); // work in 1024-unit space

      // Background
      g.fillStyle = '#000';
      g.fillRect(0, 0, 1024, 1024);

      // Display area
      g.fillStyle = '#1c1c1e';
      g.beginPath(); g.roundRect(60, 60, 904, 200, 20); g.fill();
      g.fillStyle = 'rgba(255,255,255,0.9)';
      g.font = '200 130px -apple-system,sans-serif';
      g.textAlign = 'right';
      g.textBaseline = 'alphabetic';
      g.fillText('0', 940, 228);

      // Button circles [cx, cy, color]
      const gr = '#a5a5a5', dk = '#333333', or = '#ff9f0a';
      [
        [167,342,gr],[397,342,gr],[627,342,gr],[857,342,or],
        [167,482,dk],[397,482,dk],[627,482,dk],[857,482,or],
        [167,622,dk],[397,622,dk],[627,622,dk],[857,622,or],
        [167,762,dk],[397,762,dk],[627,762,dk],[857,762,or],
        [627,902,dk],[857,902,or],
      ].forEach(([cx, cy, col]) => {
        g.beginPath(); g.arc(cx, cy, 62, 0, Math.PI * 2);
        g.fillStyle = col; g.fill();
      });

      // Zero pill button
      g.fillStyle = dk;
      g.beginPath(); g.roundRect(60, 840, 444, 124, 62); g.fill();

      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = c.toDataURL();
      document.head.appendChild(link);
    })();
  </script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      background: #000;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      /* Respect Dynamic Island at top and home indicator at bottom */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background: #000;
    }

    /* ── Display ── */
    #display {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 22px 6px;
      overflow: hidden;
      position: relative;
    }

    /* RTL wrapper: anchors content to right, scroll goes left */
    #number-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      direction: rtl;
      scrollbar-width: none;
      touch-action: pan-x;
    }
    #number-wrap::-webkit-scrollbar { display: none; }

    #number {
      direction: ltr;       /* keep digits readable */
      display: inline-block;
      min-width: 100%;      /* short numbers stay right-aligned */
      text-align: right;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 200;
      font-size: 96px;
      line-height: 1;
      letter-spacing: -2px;
      white-space: nowrap;
    }

    /* ── Magic hint dot ── */
    /* Small digit count hint bottom-left — only you know to look here */
    #magic-hint {
      position: absolute;
      bottom: 12px;
      left: 18px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #magic-hint.plus  { color: #30d158; opacity: 0.85; }
    #magic-hint.minus { color: #ff453a; opacity: 0.85; }

    /* ── Button grid ── */
    #grid {
      padding: 0 12px 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      touch-action: manipulation;
      border-radius: 50%;
      aspect-ratio: 1;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: filter 60ms;
    }

    /* Press feedback */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: transparent;
      transition: background 60ms;
    }
    .btn:active::after {
      background: rgba(255,255,255,0.18);
    }
    .op:active::after {
      background: rgba(0,0,0,0.22);
    }

    /* Function buttons: AC/C, +/−, % */
    .fn {
      background: #a5a5a5;
      color: #1c1c1e;
      font-size: 30px;
      font-weight: 500;
    }

    /* Operator buttons: ÷ × − + = */
    .op {
      background: #ff9f0a;
      color: #fff;
      font-size: 38px;
    }

    /* Active/selected operator (after tapping operator, before next digit) */
    .op.selected {
      background: #fff;
      color: #ff9f0a;
    }
    /* Inverted press feedback for selected operator */
    .op.selected:active::after {
      background: rgba(255, 159, 10, 0.25);
    }

    /* Number buttons */
    .num {
      background: #333333;
      color: #fff;
    }

    /* Zero: pill spanning 2 columns, text on left */
    .zero {
      grid-column: span 2;
      aspect-ratio: auto;
      border-radius: 9999px;
      justify-content: flex-start;
      /*
        Left-align text to the visual "center" of the left circle.
        Each button = (100vw - 24px padding - 36px gaps) / 4
        Center of one button = that / 2
        = (100vw - 60px) / 8
      */
      padding-left: calc((100vw - 60px) / 8);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="display">
      <div id="magic-hint"></div>
      <div id="number-wrap"><div id="number">0</div></div>
    </div>
    <div id="grid">
      <!-- Row 1 -->
      <button class="btn fn" id="btn-clear">AC</button>
      <button class="btn fn" id="btn-sign">+/−</button>
      <button class="btn fn" id="btn-pct">%</button>
      <button class="btn op" data-op="÷">÷</button>
      <!-- Row 2 -->
      <button class="btn num" data-digit="7">7</button>
      <button class="btn num" data-digit="8">8</button>
      <button class="btn num" data-digit="9">9</button>
      <button class="btn op" data-op="×">×</button>
      <!-- Row 3 -->
      <button class="btn num" data-digit="4">4</button>
      <button class="btn num" data-digit="5">5</button>
      <button class="btn num" data-digit="6">6</button>
      <button class="btn op" data-op="−">−</button>
      <!-- Row 4 -->
      <button class="btn num" data-digit="1">1</button>
      <button class="btn num" data-digit="2">2</button>
      <button class="btn num" data-digit="3">3</button>
      <button class="btn op" data-op="+">+</button>
      <!-- Row 5 -->
      <button class="btn num zero" data-digit="0">0</button>
      <button class="btn num" id="btn-dot">.</button>
      <button class="btn op" id="btn-eq">=</button>
    </div>
  </div>

  <script>
    // ── State ──
    let display = '0';
    let prev    = null;
    let pendingOp = null;
    let fresh   = false; // next digit replaces the display

    const numEl    = document.getElementById('number');
    const clearBtn = document.getElementById('btn-clear');

    let exprHistory = ''; // accumulated expression left of current input, e.g. "568×8683353×"

    const wrapEl = document.getElementById('number-wrap');

    // ── Render ──
    function render() {
      const shown = exprHistory
        ? exprHistory + (fresh ? '' : formatNum(display))
        : formatNum(display);
      numEl.textContent = shown;

      // 1. Shrink font until it fits, down to 30px minimum
      numEl.style.fontSize = '96px';
      const available = wrapEl.clientWidth;
      if (numEl.scrollWidth > available) {
        const fitted = Math.floor(96 * available / numEl.scrollWidth) - 2;
        numEl.style.fontSize = Math.max(fitted, 56) + 'px';
      }

      // 2. If still too wide at min font, reset scroll to right end
      //    (RTL wrapper: scrollLeft=0 = right edge, positive = further left)
      requestAnimationFrame(() => { wrapEl.scrollLeft = 0; });

      clearBtn.textContent = (display === '0' && prev === null && !pendingOp) ? 'AC' : 'C';
    }

    function setDisplay(val) { display = val; render(); }

    // Add thousands separators for display only (display variable stays raw for calculations)
    function formatNum(s) {
      if (!s || s.includes('e')) return s;
      const neg = s.startsWith('-');
      const str = neg ? s.slice(1) : s;
      const [intPart, decPart] = str.split('.');
      const grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return (neg ? '-' : '') + grouped + (decPart !== undefined ? '.' + decPart : '');
    }

    function highlightOp(op) {
      document.querySelectorAll('[data-op]').forEach(b => b.classList.remove('selected'));
      if (op) {
        const btn = document.querySelector(`[data-op="${CSS.escape(op)}"]`);
        if (btn) btn.classList.add('selected');
      }
    }

    // ── Input handlers ──
    function onDigit(d) {
      if (magicState === 'complete') return; // alle cijfers al in — blokkeer extra invoer

      // ── Magic: replace digit with needed digit ──
      if (magicState === 'entering') {
        if (magicIndex >= magicDigits.length) return; // ignore extra presses
        const md = magicDigits[magicIndex++];
        if (fresh) {
          setDisplay(md === '0' ? '0' : md);
          fresh = false;
        } else {
          if (display === '0') setDisplay(md);
          else setDisplay(display + md);
        }
        highlightOp(null);
        // Signal magician when all digits are in: = button flashes white
        if (magicIndex === magicDigits.length) {
          magicState = 'complete';
          const eq = document.getElementById('btn-eq');
          eq.style.background = '#fff';
          eq.style.color = '#ff9f0a';
          setTimeout(() => { eq.style.background = '#ff9f0a'; eq.style.color = '#fff'; }, 300);
        }
        return;
      }

      if (fresh) {
        setDisplay(d === '0' ? '0' : d);
        fresh = false;
      } else {
        if (display === '0') setDisplay(d);
        else if (display.replace(/[\-\.]/g, '').length < 9) setDisplay(display + d);
      }
      highlightOp(null);
    }

    function onDot() {
      if (magicState === 'entering' || magicState === 'complete') return;
      if (fresh) { setDisplay('0.'); fresh = false; }
      else if (!display.includes('.')) setDisplay(display + '.');
      highlightOp(null);
    }

    function onOperator(op) {
      if (magicState === 'entering' || magicState === 'complete') return;

      const cur = parseFloat(display);
      if (pendingOp && !fresh) {
        const result = compute(prev, cur, pendingOp);
        const typed = display;
        prev = result;
        display = fmt(result);
        exprHistory = exprHistory + formatNum(typed) + op;
      } else {
        prev = cur;
        exprHistory = formatNum(display) + op;
      }
      pendingOp = op;
      fresh = true;
      render();
      highlightOp(op);

      // Magic: operator pressed after the multiplication result — start entry phase
      if (magicState === 'awaiting-op') {
        prev      = magicResultRaw;   // use exact float, not parseFloat(fmt(...))
        magicState = 'entering';
        magicIndex = 0;
        magicHintEl.className = ''; magicHintEl.textContent = '';   // dot heeft zijn doel gedaan
      }
    }

    function onEquals() {
      if (pendingOp === null) return;
      const cur    = parseFloat(display);
      const result = compute(prev, cur, pendingOp);
      exprHistory = '';
      setDisplay(fmt(result));

      // ── Magic: after multiplication result, calculate needed adjustment ──
      if (magicMode && magicState === null) {
        const target  = getMagicTarget();
        const needed  = target - result;
        const abs     = Math.abs(Math.round(needed));
        magicResultRaw = result;
        magicDigits   = String(abs).split('');
        magicIndex    = 0;
        magicState    = 'awaiting-op';
        magicHintEl.textContent = (needed >= 0 ? '+' : '−') + magicDigits.length;
        magicHintEl.className = needed >= 0 ? 'plus' : 'minus';
      } else if (magicState === 'complete') {
        // Magic reveal done — reset for next performance
        magicState = null;
        magicHintEl.className = ''; magicHintEl.textContent = '';
      }

      prev      = null;
      pendingOp = null;
      fresh     = true;
      highlightOp(null);
    }

    function onClear() {
      // Emergency exit from magic sequence
      if (magicState === 'entering' || magicState === 'awaiting-op' || magicState === 'complete') {
        magicState = null;
        magicHintEl.className = ''; magicHintEl.textContent = '';
      }

      if (clearBtn.textContent === 'C') {
        setDisplay('0');
        // Keep pending op / prev so user can continue
      } else {
        setDisplay('0');
        prev        = null;
        pendingOp   = null;
        fresh       = false;
        exprHistory = '';
        highlightOp(null);
      }
    }

    function onSign() {
      if (magicState === 'entering' || magicState === 'complete') return;
      if (display === '0') return;
      setDisplay(display.startsWith('-') ? display.slice(1) : '-' + display);
    }

    function onPercent() {
      if (magicState === 'entering' || magicState === 'complete') return;
      setDisplay(fmt(parseFloat(display) / 100));
    }

    // ── Math ──
    function compute(a, b, op) {
      switch (op) {
        case '+': return a + b;
        case '−': return a - b;
        case '×': return a * b;
        case '÷': return b !== 0 ? a / b : 0;
      }
    }

    function fmt(n) {
      if (!isFinite(n)) return '0';
      // Kill floating-point noise (e.g. 0.1+0.2)
      let s = parseFloat(n.toPrecision(10)).toString();
      // Too many digits → fewer sig figs
      if (s.replace(/[-\.]/g, '').length > 9) s = parseFloat(n.toPrecision(7)).toString();
      // Still too long → scientific notation
      if (s.length > 12) s = n.toExponential(3);
      return s;
    }

    // ── Wire up buttons ──
    document.querySelectorAll('[data-digit]').forEach(btn =>
      btn.addEventListener('click', () => onDigit(btn.dataset.digit)));

    document.querySelectorAll('[data-op]').forEach(btn =>
      btn.addEventListener('click', () => onOperator(btn.dataset.op)));

    document.getElementById('btn-clear').addEventListener('click', onClear);
    document.getElementById('btn-sign').addEventListener('click', onSign);
    document.getElementById('btn-pct').addEventListener('click', onPercent);
    document.getElementById('btn-dot').addEventListener('click', onDot);
    document.getElementById('btn-eq').addEventListener('click', onEquals);

    render();

    // ════════════════════════════════════════════════════════
    // ── MAGIC TRICK ──────────────────────────────────────────
    // ════════════════════════════════════════════════════════

    let magicMode      = false;
    let magicState     = null;   // null | 'awaiting-op' | 'entering' | 'complete'
    let magicDigits    = [];
    let magicIndex     = 0;
    let magicResultRaw = 0;      // raw multiplication result (avoids fmt() rounding)

    const magicHintEl = document.getElementById('magic-hint');

    // Target = current date/time + 1 minute as DDMMHHmm (e.g. 17031424 = 17 mrt 14:24)
    function getMagicTarget() {
      const now = new Date(Date.now() + 60000);
      const d   = String(now.getDate()).padStart(2, '0');
      const m   = String(now.getMonth() + 1).padStart(2, '0');
      const h   = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      return parseInt(d + m + h + min, 10);
    }

    // Secret activation: long-press % for 800ms
    // Green flash = magic ON, red flash = magic OFF
    let magicLongTimer = null;
    const pctBtn = document.getElementById('btn-pct');

    pctBtn.addEventListener('pointerdown', () => {
      magicLongTimer = setTimeout(() => {
        magicLongTimer = null;
        magicMode  = !magicMode;
        magicState = null;
        magicHintEl.className = ''; magicHintEl.textContent = '';
        // Confirmation: % button flashes green (on) or red (off)
        pctBtn.style.background = magicMode ? '#30d158' : '#ff453a';
        setTimeout(() => { pctBtn.style.background = '#a5a5a5'; }, 500);
      }, 800);
    });

    ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt =>
      pctBtn.addEventListener(evt, () => {
        if (magicLongTimer) { clearTimeout(magicLongTimer); magicLongTimer = null; }
      })
    );
  </script>
</body>
</html>
